<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>혜택허브</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-lockup">
          <div class="app-icon" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span>
          </div>
          <div>
            <h1>혜택허브</h1>
          </div>
        </div>
        <nav class="top-nav" aria-label="빠른 메뉴">
          <a class="is-active" href="#benefits">Home</a>
          <a href="#radiusTabs">Radius</a>
          <a href="#benefits">Offers</a>
        </nav>
        <button class="icon-button" id="locateButton" type="button" aria-label="내 위치 새로고침" title="내 위치 새로고침">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 4.25v2.1M12 17.65v2.1M19.75 12h-2.1M6.35 12h-2.1" />
            <circle cx="12" cy="12" r="4.6" />
            <circle cx="12" cy="12" r="1.15" />
          </svg>
        </button>
      </header>

      <section class="hero-panel" aria-label="혜택허브 요약">
        <div class="hero-copy">
          <p class="eyebrow">PAY LESS AROUND YOU</p>
          <h2>내 주변 할인, 결제 전에 바로 확인</h2>
          <p>50m부터 전체까지 반경을 바꾸며 오늘 받을 수 있는 혜택을 모아봅니다.</p>
        </div>
        <div class="hero-phone" aria-hidden="true">
          <div class="phone-screen">
            <span class="tile tile-big">%</span>
            <span class="tile">1+1</span>
            <span class="tile">UP</span>
            <span class="tile">₩</span>
          </div>
        </div>
      </section>

      <section class="location-strip" aria-label="현재 위치">
        <div class="location-copy">
          <div>
            <strong id="locationName">강남역 11번 출구 근처</strong>
            <p id="locationMeta">샘플 데이터 기준 현재 위치</p>
          </div>
        </div>
        <span class="saving-pill" id="savingSummary">예상 절감 1,900원</span>
      </section>

      <section class="search-section" aria-label="할인 검색">
        <label class="search-box">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="10.7" cy="10.7" r="5.95" />
            <path d="m15.2 15.2 4.05 4.05" />
          </svg>
          <input id="searchInput" type="search" placeholder="브랜드, 혜택, 앱 검색" autocomplete="off" />
        </label>
      </section>

      <section class="radius-section coral-band" aria-label="지역 반경">
        <div class="section-heading">
          <h2>내 위치 반경</h2>
          <p id="resultCount">0개 혜택</p>
        </div>
        <div class="radius-tabs" id="radiusTabs" role="tablist" aria-label="반경 선택"></div>
      </section>

      <section class="quick-filters" aria-label="혜택 유형">
        <button class="filter-chip is-active" type="button" data-filter="all"><span aria-hidden="true">⌘</span>전체</button>
        <button class="filter-chip" type="button" data-filter="discount"><span aria-hidden="true">%</span>할인</button>
        <button class="filter-chip" type="button" data-filter="oneplus"><span aria-hidden="true">+</span>1+1</button>
        <button class="filter-chip" type="button" data-filter="upgrade"><span aria-hidden="true">↑</span>사이즈업</button>
        <button class="filter-chip" type="button" data-filter="coupon"><span aria-hidden="true">◌</span>쿠폰</button>
      </section>

      <section class="benefit-list" id="benefits" aria-label="내 주변 할인 리스트"></section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./mockdata.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
